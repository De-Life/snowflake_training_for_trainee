name: 'mydbt'
version: '1.0.0'

profile: 'mydbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  mydbt:
    mymodel:
      +materialized: table
      +schema: NORMALIZED

seeds:
  mydbt:
    classify_text_labels:
      +schema: NORMALIZED
      +column_types:
        LABEL: varchar
        DESCRIPTION: varchar